name: 'Verilator Lint Checker'
description: 'Runs Verilator linting on SystemVerilog files and outputs a JSON result.'

inputs:
  files:
    description: 'Space-separated list of .sv file paths'
    required: true
  severity:
    description: 'Lint severity level (e.g., warning, error)'
    required: false
    default: 'warning'

outputs:
  results:
    description: 'JSON formatted pass/fail results per file'
    value: ${{ steps.lint-script.outputs.results }}

runs:
  using: "composite"
  steps:
    - name: Install Verilator
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y verilator

    - name: Run Linting Script
      id: lint-script
      shell: bash
      # github.action_path ensures it runs the python script from THIS action's repo, not the user's repo
      run: python3 ${{ github.action_path }}/linter.py
      env:
        # GitHub automatically passes inputs to the environment
        INPUT_FILES: ${{ inputs.files }}
        INPUT_SEVERITY: ${{ inputs.severity }}
